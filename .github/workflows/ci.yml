name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile (structural gate)
        run: python -m py_compile ugendran.py _generator/*.py tests/*.py

      - name: Lint (real bugs only)
        run: |
          pip install ruff
          ruff check .

      - name: Install OpenSpec CLI (enables strict-validate tests)
        run: npm install -g @fission-ai/openspec@1.3.1

      - name: Tests
        run: python -m unittest discover -s tests -v
